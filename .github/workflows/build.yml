name: build

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows-installer:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Generate icon
        run: python assets/make_icon.py

      - name: Build Pipevoice.exe
        run: >
          pyinstaller --noconfirm --clean --noconsole --onedir --noupx --name Pipevoice
          --icon assets/wisprlite.ico
          --add-data "assets/wisprlite.ico;assets"
          --add-data "assets/pipevoice-lockup.png;assets"
          --collect-all deepgram
          --collect-all faster_whisper
          --collect-all ctranslate2
          --collect-all pystray
          --collect-all PIL
          launch.py

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer
        run: '& "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\Pipevoice.iss'

      - name: Compute SHA-256
        shell: pwsh
        run: |
          $h = (Get-FileHash installer/Output/Pipevoice-Setup.exe -Algorithm SHA256).Hash.ToLower()
          [System.IO.File]::WriteAllText("installer/Output/Pipevoice-Setup.exe.sha256", $h)

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: Pipevoice-Setup
          path: installer/Output/Pipevoice-Setup.exe

      - name: Publish release (on version tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            installer/Output/Pipevoice-Setup.exe
            installer/Output/Pipevoice-Setup.exe.sha256
          generate_release_notes: true
